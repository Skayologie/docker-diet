name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 300
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: docker-diet-windows-x86_64.exe
            binary: target/x86_64-pc-windows-msvc/release/docker-diet.exe

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: docker-diet-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/docker-diet

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: docker-diet-macos-aarch64
            binary: target/aarch64-apple-darwin/release/docker-diet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build
        run: >
          cargo build
          --release
          --package diet-cli
          --target ${{ matrix.target }}
        # Note: no --features ebpf — ships with static analysis by default.
        # Users who want eBPF runtime profiling can build from source on Linux:
        #   cargo build --release --package diet-cli --features ebpf

      - name: Rename & upload artifact
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "docker-diet ${{ github.ref_name }}"
          body: |
            ## docker-diet ${{ github.ref_name }}

            ### One-command install

            **Windows:**
            ```powershell
            irm https://jawadboulmal.com/envault/install.ps1 | iex
            ```

            **Linux / macOS:**
            ```bash
            bash <(curl -sSf https://jawadboulmal.com/envault/install.sh)
            ```

            ### Manual download
            Pick the binary for your platform from the assets below.

            ### eBPF runtime profiling (advanced, Linux only)
            The distributed binary uses **static analysis** by default (works everywhere, no root needed).
            To enable eBPF runtime profiling, build from source on Linux:
            ```bash
            cargo build --release --package diet-cli --features ebpf
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
